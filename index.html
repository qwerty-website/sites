<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sites - Social Content Sharing Platform</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modals.css">
    
    <!-- JavaScript Modules -->
    <script type="module" src="js/main.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-container">
            <div class="login-header">
                <h1>🌐 Sites</h1>
                <p>Social Content Sharing Platform</p>
            </div>
            
            <div class="login-form">
                <input type="text" id="loginUsername" placeholder="Username" autocomplete="username">
                <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                <button id="loginBtn" class="primary-button">Login</button>
                <button id="registerBtn" class="secondary-button">Create Account</button>
            </div>
            
            <div class="login-footer">
                <p>Sites v4.0 - Social Platform</p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display: none;">
        <!-- User Bar -->
        <div id="userBar" class="user-bar">
            <div class="user-info">
                <span class="logo">🌐 Sites</span>
                <span id="userDisplay"></span>
            </div>
            <div class="user-actions">
                <button id="notificationBtn" class="icon-button">
                    <span>🔔</span>
                    <span id="notificationBadge" class="badge"></span>
                </button>
                <button id="profileBtn" class="icon-button">👤 My Profile</button>
                <button id="settingsBtn" class="icon-button">⚙️ Settings</button>
                <button id="logoutBtn" class="icon-button">🚪 Logout</button>
            </div>
        </div>

        <!-- Admin Report Review Banner -->
        <div id="reportReviewBanner" class="report-banner"></div>

        <!-- Navigation Tabs -->
        <div id="navTabs" class="nav-tabs"></div>

        <!-- Content Tabs -->
        <div class="content-container">
            <!-- Browse Tab -->
            <div id="browseTab" class="tab-content active">
                <div class="browse-controls">
                    <input type="text" id="searchInput" placeholder="🔍 Search posts...">
                    <button id="clearSearchBtn" class="secondary-button">✕ Clear</button>
                    <select id="sortSelect"></select>
                    <button id="refreshBtn" class="icon-button">🔄 Refresh</button>
                    <button id="filtersBtn" class="icon-button">🔍 Filters</button>
                </div>
                <div id="browseGallery" class="gallery"></div>
            </div>

            <!-- My Posts Tab -->
            <div id="mygamesTab" class="tab-content">
                <div id="mygamesGallery" class="gallery"></div>
            </div>

            <!-- Starred Tab -->
            <div id="starredTab" class="tab-content">
                <div id="starredGallery" class="gallery"></div>
            </div>

            <!-- Bookmarks Tab -->
            <div id="bookmarksTab" class="tab-content">
                <div id="bookmarksGallery" class="gallery"></div>
            </div>

            <!-- Collections Tab -->
            <div id="collectionsTab" class="tab-content">
                <div id="collectionsGallery" class="gallery"></div>
            </div>

            <!-- Leaderboards Tab -->
            <div id="leaderboardsTab" class="tab-content">
                <div id="leaderboardsContent" class="gallery"></div>
            </div>

            <!-- Add Post Tab -->
            <div id="addTab" class="tab-content">
                <div id="addPostForm" class="add-form"></div>
            </div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modalsContainer"></div>

    <!-- Debug Panel -->
    <button id="debugToggle" class="debug-toggle">🐛 Debug</button>
    <div id="debugPanel" class="debug-panel"></div>

    <!-- Panic Button -->
    <button id="panicButton" class="panic-button">🚨</button>
</body>
</html>
